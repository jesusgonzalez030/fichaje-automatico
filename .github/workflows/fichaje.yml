name: Fichaje Automatico

on:
  schedule:
    - cron: "50 6 * * 1-5"
    - cron: "3 14 * * 1-5"
  workflow_dispatch:

jobs:
  fichar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar playwright
        run: |
          pip install playwright
          playwright install chromium
          playwright install-deps chromium

      - name: Determinar accion
        run: |
          HORA=$(TZ="Europe/Madrid" date +"%H")
          if [ "$HORA" -lt "12" ]; then
            echo "FICHAR_ACCION=entrada" >> $GITHUB_ENV
          else
            echo "FICHAR_ACCION=salida" >> $GITHUB_ENV
          fi

      - name: Fichar
        env:
          KUBY_USER: ${{ secrets.KUBY_USER }}
          KUBY_PASS: ${{ secrets.KUBY_PASS }}
          FICHAR_ACCION: ${{ env.FICHAR_ACCION }}
        run: python fichar.py
