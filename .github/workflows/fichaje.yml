name: Fichaje Automatico

on:
  schedule:
    - cron: "50 5 * * 1-5"
    - cron: "50 6 * * 1-5"
    - cron: "3 13 * * 1-5"
    - cron: "3 14 * * 1-5"
  workflow_dispatch:

jobs:
  fichar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install requests

      - name: Determinar accion y verificar hora
        run: |
          HORA=$(TZ="Europe/Madrid" date +"%H")
          MINUTO=$(TZ="Europe/Madrid" date +"%M")
          HORA_ESP=$(TZ="Europe/Madrid" date +"%H:%M")
          echo "Hora en Espana: $HORA_ESP"
          if [ "$HORA" -lt "12" ]; then
            echo "FICHAR_ACCION=entrada" >> $GITHUB_ENV
            if [ "$HORA" -ne "7" ] || [ "$MINUTO" -lt "40" ]; then
              echo "Hora fuera de rango entrada: $HORA_ESP - abortando"
              exit 0
            fi
          else
            echo "FICHAR_ACCION=salida" >> $GITHUB_ENV
            if [ "$HORA" -ne "15" ] || [ "$MINUTO" -gt "13" ]; then
              echo "Hora fuera de rango salida: $HORA_ESP - abortando"
              exit 0
            fi
          fi
          echo "Fichando a las: $HORA_ESP"

      - name: Fichar
        env:
          KUBY_USER: ${{ secrets.KUBY_USER }}
          KUBY_PASS: ${{ secrets.KUBY_PASS }}
          FICHAR_ACCION: ${{ env.FICHAR_ACCION }}
        run: python fichar.py
